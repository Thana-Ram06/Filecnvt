kind = "web"
previewPath = "/converter/"
title = "File Converter"
version = "1.0.0"
id = "artifacts/file-converter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/converter/" ]
localPort = 20698

[services.development]
run = "pnpm --filter @workspace/file-converter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/file-converter", "run", "build" ]
publicDir = "artifacts/file-converter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20698"
BASE_PATH = "/converter/"
